name: Release

on:
  release:
    types: [created]

jobs:
  build-and-publish:
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack Journey (core)
        run: dotnet pack Journey/Journey.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Postgres
        run: dotnet pack Journey.Postgres/Journey.Postgres.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.MySql
        run: dotnet pack Journey.MySql/Journey.MySql.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Sqlite
        run: dotnet pack Journey.Sqlite/Journey.Sqlite.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Mssql
        run: dotnet pack Journey.Mssql/Journey.Mssql.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Cassandra
        run: dotnet pack Journey.Cassandra/Journey.Cassandra.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.All (meta-package)
        run: dotnet pack Journey.All/Journey.All.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Net (all-in-one tool)
        run: dotnet pack Journey.Net/Journey.Net.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Net.Postgres
        run: dotnet pack Journey.Net.Postgres/Journey.Net.Postgres.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Net.MySql
        run: dotnet pack Journey.Net.MySql/Journey.Net.MySql.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Net.Sqlite
        run: dotnet pack Journey.Net.Sqlite/Journey.Net.Sqlite.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Net.Mssql
        run: dotnet pack Journey.Net.Mssql/Journey.Net.Mssql.csproj --no-build --configuration Release --output ./nupkgs

      - name: Pack Journey.Net.Cassandra
        run: dotnet pack Journey.Net.Cassandra/Journey.Net.Cassandra.csproj --no-build --configuration Release --output ./nupkgs
    
        # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Push the packages
      - name: NuGet push
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
